name: frontend-workshop-demo

on: 
    push:
        branches:
            - 'feature/**'
            - 'bugfix/**'
            - 'chore/**'
            - main # don't forget to remove if use normal flow
    pull_request:
        branches:
            - main

jobs:
  lint-job:
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v6
        - uses: actions/setup-node@v6
          with: 
            node-version: '24.x'
            cache: 'npm'
        - run: npm ci # Clean Install
        - run: npm run lint
  build-job:
    runs-on: ubuntu-latest
    needs: lint-job
    steps:
        - name: Clone Repo
          uses: actions/checkout@v6
        - name: Setup Node.js version 24.x
          uses: actions/setup-node@v6
          with: 
            node-version: '24.x'
            cache: 'npm'
        - name: install dependencies
          run: npm ci # Clean Install
        - name: Build Project
          run: npm run build
