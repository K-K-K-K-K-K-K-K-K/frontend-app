name: Deploy to Docker

on:
    push:
        tags:
            - '[0-9]+.[0-9]+.[0-9]+'
            #- '*.*.*'
jobs:
    build-image-and-push-job:
        runs-on: ubuntu-latest
        steps:
          - name: Clone Repo
            uses: actions/checkout@v6
          - name: Build & push Docker image to Github Registry
            uses: mr-smithers-excellent/docker-build-push@v6
            with: 
                image: ${{github.event.repository.name}}
                # tags: v1, latest # Use GitOps autotaging
                registry: ghcr.io
                dockerfile: Dockerfile
                username: ${{ github.actor }} # Github Username
                password: ${{secrets.GITHUB_TOKEN}}
    auto-deploy-docker-job:
      runs-on: ubuntu-latest
      needs: build-image-and-push-job
      environment: production
      env:
        CONTAINER_NAME: ${{github.actor}}
        SERVER_PORT: 3948
        DOCKER_IMAGE_URL: 'ghcr.io/k-k-k-k-k-k-k-k-k/${{github.event.repository.name}}:${{github.ref_name}}'
      steps:
        - name: Execute remote SSH commands using password
          uses: appleboy/ssh-action@v1.2.5
          with:
            host: ${{ secrets.SERVER_IP }}
            username: ${{ secrets.SERVER_USER }}
            password: ${{ secrets.SERVER_PASSWORD }}
            port: '22'
            script: |
              docker -v
              docker logout ghcr.io
              docker login -u ${{github.actor}} -p ${{secrets.GITHUB_TOKEN}} ghcr.io/k-k-k-k-k-k-k-k-k/${{github.event.repository.name}}
              docker rm -f ${{env.CONTAINER_NAME}} | true
              docker pull ${{env.DOCKER_IMAGE_URL}}
              docker run --restart=always -d --name ${{env.CONTAINER_NAME}} -p ${{env.SERVER_PORT}}:80 ${{env.DOCKER_IMAGE_URL}}