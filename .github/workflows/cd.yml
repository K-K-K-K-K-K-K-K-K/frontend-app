name: Deploy to Github Page

on:
    push:
        tags:
            - '[0-9]+.[0-9]+.[0-9]+'
            #- '*.*.*'
jobs:
    build-prod-job:
        runs-on: ubuntu-latest
        steps:
          - name: Clone Repo
            uses: actions/checkout@v6
          - name: Setup Node.js version 24.x
            uses: actions/setup-node@v6
            with: 
                node-version: '24.x'
                cache: 'npm'
          - name: install dependencies
            run: npm ci # Clean Install
          - name: Build Project(Production dist folder)
            run: npm run build
          - name: Upload folder artifact
            uses: actions/upload-artifact@v6
            with:
                name: 'dist-production'
                path: 'dist'
    auto-deploy-github-page:
        runs-on: ubuntu-latest
        needs: build-prod-job
        permissions:
            contents: write
        steps:
        - name: Download this folder's artifact
          uses: actions/download-artifact@v8
          with:
            name: dist-production
            path: dist
        - run: ls dist
        - uses: actions/checkout@v6
        - name: Deploy to Github Page
          uses: SerhiiKa/VuePagesAction@1.0.4
          with:
            username: ${{github.actor}}
            reponame: ${{github.event.repository.name}}
            token: ${{ secrets.GITHUB_TOKEN }} # Leave this line unchanged 